{% extends 'base.html' %}

{% block title %}Ro'yxatdan o'tish{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Ro'yxatdan o'tish</h3>
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-dark w-100 mt-3">
                        Ro'yxatdan o'tish
                    </button>
                </form>
                <p class="text-center mt-3">
                    Hisobingiz bormi?
                    <a href="{% url 'login' %}">Kirish</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
